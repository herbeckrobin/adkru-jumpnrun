name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    name: Bun / TypeScript / Vitest / Biome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test

  php:
    name: PHP / Composer / PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2
      - run: composer install --prefer-dist --no-interaction
      - run: |
          if [ -d tests/php ] && [ -n "$(ls -A tests/php 2>/dev/null)" ]; then
            vendor/bin/phpunit
          else
            echo "Noch keine PHPUnit-Tests — skip in Phase 1."
          fi
